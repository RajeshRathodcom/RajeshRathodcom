name: Update stats card

on:
  schedule:
    # Runs once a day at 03:00 UTC (~08:30 IST)
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate stats card
        env:
          GH_USERNAME: RajeshRathodcom
          GH_TOKEN: ${{ secrets.STATS_PAT }}
        run: node scripts/generate-stats.js

      - name: Commit updated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg
          git diff --quiet --cached || git commit -m "chore: refresh stats card"
          git push
